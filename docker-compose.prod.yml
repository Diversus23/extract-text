services:
  api:
    container_name: extract-text-prod
    build: .
    # Перебиваем dev-volume ./app:/code/app — в prod код используется только из образа.
    volumes: []
    command: >
      sh -c "
        CALCULATED_WORKERS=$$(expr 2 \* $${CPU_CORES:-4} + 1);
        exec uvicorn app.main:app --host 0.0.0.0 --port $${API_PORT:-7555} --workers $${WORKERS:-$$CALCULATED_WORKERS}
      "
    restart: always
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
